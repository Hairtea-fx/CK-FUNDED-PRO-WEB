<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges | CK Funded Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#050505] text-white font-sans">

    <nav class="p-6 border-b border-white/5 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html"><img src="logo.png" alt="Logo" class="h-8"></a>
            <div class="flex gap-8">
                <a href="index.html" class="text-gray-400 hover:text-white">Home</a>
                <a href="challenge.html" class="text-[#ffb800] font-bold">Challenge</a>
                <a href="dashboard.html" class="text-gray-400 hover:text-white">Dashboard</a>
            </div>
        </div>
    </nav>

    <section class="py-20">
        <div class="max-w-6xl mx-auto px-4">
            <div class="text-center mb-16">
                <h1 class="text-6xl font-black tracking-tighter mb-4">PICK YOUR ACCOUNT</h1>
                <p class="text-gray-400">Choose the size and model that fits your trading style.</p>
            </div>

            <div class="bg-[#111] border border-white/10 rounded-[40px] p-8 lg:p-12">
                
                <div class="mb-12">
                    <label class="text-gray-500 uppercase text-xs font-bold tracking-[0.2em] mb-6 block">01. Select Capital Size</label>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                        <button onclick="updatePrice(32)" class="size-btn py-4 rounded-xl border border-white/10 bg-white/5 hover:border-[#ffb800] transition-all font-bold active-size">$5,000</button>
                        <button onclick="updatePrice(54)" class="size-btn py-4 rounded-xl border border-white/10 bg-white/5 hover:border-[#ffb800] transition-all font-bold">$10,000</button>
                        <button onclick="updatePrice(129)" class="size-btn py-4 rounded-xl border border-white/10 bg-white/5 hover:border-[#ffb800] transition-all font-bold">$25,000</button>
                        <button onclick="updatePrice(249)" class="size-btn py-4 rounded-xl border border-white/10 bg-white/5 hover:border-[#ffb800] transition-all font-bold">$50,000</button>
                        <button onclick="updatePrice(479)" class="size-btn py-4 rounded-xl border border-white/10 bg-white/5 hover:border-[#ffb800] transition-all font-bold">$100,000</button>
                    </div>
                </div>

                <div class="mb-12">
                    <label class="text-gray-500 uppercase text-xs font-bold tracking-[0.2em] mb-6 block">02. Select Evaluation Type</label>
                    <div class="flex gap-4">
                        <button class="flex-1 py-4 rounded-xl border border-[#ffb800] bg-[#ffb800] text-black font-black">2-Step Evaluation</button>
                        <button class="flex-1 py-4 rounded-xl border border-white/10 bg-white/5 text-white font-black opacity-50 cursor-not-allowed">1-Step (Coming Soon)</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 pt-8 border-t border-white/5">
                    <div class="space-y-4">
                        <div class="flex justify-between border-b border-white/5 pb-4">
                            <span class="text-gray-400">Profit Target</span>
                            <span class="font-bold">10% / 5%</span>
                        </div>
                        <div class="flex justify-between border-b border-white/5 pb-4">
                            <span class="text-gray-400">Daily Loss</span>
                            <span class="font-bold text-red-500">5% (Equity Based)</span>
                        </div>
                        <div class="flex justify-between border-b border-white/5 pb-4">
                            <span class="text-gray-400">Max Overall Loss</span>
                            <span class="font-bold text-red-500">10%</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">Leverage</span>
                            <span class="font-bold text-[#ffb800]">1:100</span>
                        </div>
                    </div>

                    <div class="bg-white/5 rounded-3xl p-8 text-center flex flex-col justify-center border border-white/5">
                        <p class="text-xs text-gray-500 uppercase font-bold mb-2">Total to Pay</p>
                        <div class="text-7xl font-black mb-8" id="display-price">$32.00</div>
                        <button class="w-full py-5 bg-[#ffb800] text-black font-black rounded-2xl text-xl hover:scale-105 transition-transform shadow-[0_0_30px_rgba(255,184,0,0.2)]">
                            Start Challenge
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function updatePrice(price) {
            document.getElementById('display-price').innerText = '$' + price + '.00';
            
            // Visual feedback for buttons
            const btns = document.querySelectorAll('.size-btn');
            btns.forEach(btn => {
                btn.classList.remove('bg-white', 'text-black', 'border-[#ffb800]');
                btn.classList.add('bg-white/5', 'text-white');
            });
            event.target.classList.add('bg-white', 'text-black', 'border-[#ffb800]');
        }
    </script>
</body>
</html>
